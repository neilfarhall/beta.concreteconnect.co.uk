      header: true
      attributes:
        async: true
      weight: -20

    js/sas-init.js:
      header: true
      weight: -10

    js/sas-render.js:
      # IMPORTANT: do NOT set header:true here.
      # Let this run when the DOM / BigPipe content is present.
      weight: 0

  dependencies:
    - core/drupal
    - core/once
